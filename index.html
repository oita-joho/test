<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出欠管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>出欠管理</h1>
      <div id="authStatus" class="auth-status">未ログイン</div>
    </header>

    <!-- ログイン -->
    <section class="panel" id="loginPanel">
      <div class="buttons">
        <button id="loginBtn" class="btn primary">先生ログイン</button>
        <button id="logoutBtn" class="btn secondary" style="display:none;">ログアウト</button>
      </div>
      <p id="loginMessage" class="note">先生ログインが必要です。</p>
    </section>

    <!-- ログイン後 -->
    <div id="appBody" style="display:none;">

      <!-- モード切替 -->
      <section class="panel">
        <div class="mode-buttons">
          <button id="modeAttendanceBtn" class="btn primary">出欠</button>
          <button id="modeNominateBtn" class="btn secondary">指名</button>
          <button id="modeSettingsBtn" class="btn secondary">設定</button>
        </div>
      </section>

      <!-- 出欠を閉じた時に出すバー -->
      <section class="panel" id="attendanceToggleBar" style="display:none;">
        <div class="buttons">
          <button id="openAttendanceBtn" class="btn primary">出欠入力を開く</button>
        </div>
      </section>

      <!-- 出欠パネル -->
      <section class="panel" id="attendancePanel">
        <h2 class="section-title">出欠入力</h2>

        <div class="toolbar">
          <div class="field">
            <label for="classSelect">クラス</label>
            <select id="classSelect">
              <option value="class1">class1</option>
              <option value="class2">class2</option>
              <option value="class3">class3</option>
            </select>
          </div>

          <div class="field">
            <label for="dateInput">日付</label>
            <input type="date" id="dateInput" />
          </div>

          <div class="field">
            <label for="slotSelect">時限</label>
            <select id="slotSelect">
              <option value="1">1時間目</option>
              <option value="2">2時間目</option>
              <option value="3">3時間目</option>
            </select>
          </div>

          <div class="buttons">
            <button id="todayBtn" class="btn today">今日</button>
            <button id="prevDayBtn" class="btn secondary">前日</button>
            <button id="prevWeekBtn" class="btn secondary">前週</button>
            <button id="prevMonthBtn" class="btn secondary">前月</button>
            <button id="saveBtn" class="btn primary">SAVE</button>
          </div>
        </div>

        <div class="status-grid">
          <div class="status-card">
            <div class="status-title">欠席人数</div>
            <div id="absentCount" class="status-value">0</div>
          </div>

          <div class="status-card">
            <div class="status-title">保存状態</div>
            <div id="saveState" class="status-value small">---</div>
          </div>

          <div class="status-card">
            <div class="status-title">1時間目</div>
            <div id="slot1State" class="status-value small">---</div>
          </div>

          <div class="status-card">
            <div class="status-title">2時間目</div>
            <div id="slot2State" class="status-value small">---</div>
          </div>

          <div class="status-card">
            <div class="status-title">3時間目</div>
            <div id="slot3State" class="status-value small">---</div>
          </div>
        </div>
      </section>
<!-- 指名パネル -->
<section class="panel" id="nominatePanel" style="display:none;">
  <h2 class="section-title">指名</h2>

  <div class="toolbar">
    <div class="field">
      <label for="nominateClassSelect">クラス</label>
      <select id="nominateClassSelect">
        <option value="class1">class1</option>
        <option value="class2">class2</option>
        <option value="class3">class3</option>
      </select>
    </div>

    <div class="field">
      <label for="nominateDateInput">日付</label>
      <input type="date" id="nominateDateInput" />
    </div>

    <div class="field">
      <label for="nominateSlotSelect">時限</label>
      <select id="nominateSlotSelect">
        <option value="1">1時間目</option>
        <option value="2">2時間目</option>
        <option value="3">3時間目</option>
      </select>
    </div>

    <div class="buttons">
      <button id="randomNominateBtn" class="btn primary">ランダム指名</button>
      <button id="clearNominateBtn" class="btn secondary">指名解除</button>
      <button id="aggregateNominateBtn" class="btn today">集計</button>
    </div>
  </div>

  <div class="status-grid" style="margin-top:16px;">
    <div class="status-card">
      <div class="status-title">今回の指名</div>
      <div id="currentNomineeName" class="status-value small">---</div>
    </div>
    <div class="status-card">
      <div class="status-title">番号</div>
      <div id="currentNomineeNo" class="status-value">---</div>
    </div>
    <div class="status-card">
      <div class="status-title">状態</div>
      <div id="nominateState" class="status-value small">未指名</div>
    </div>
  </div>

  <p class="note">
    欠席者はランダム指名の対象外です。月累計は「集計」を押した時だけ更新します。
  </p>

  <div id="nominateStudentGrid" class="student-grid"></div>
</section>
      <!-- 生徒一覧 -->
      <section class="panel" id="studentListPanel">
        <div id="studentCount" class="student-count">登録人数：0人</div>
        <p class="note">名前は直接編集できます。欠席ボタンで出欠を切り替えます。</p>

        <div class="grid-header">
          <div>番号</div>
          <div>氏名</div>
          <div>出欠</div>
          <div>日</div>
          <div>週</div>
          <div>月</div>
        </div>

        <div id="studentGrid" class="student-grid"></div>
      </section>

      <!-- 設定 -->
<section class="panel" id="settingsPanel" style="display:none;">
  <h2 class="section-title">設定（年度初めのみ）</h2>

  <div class="toolbar">
    <div class="field">
      <label for="settingsClassSelect">クラス</label>
      <select id="settingsClassSelect">
        <option value="class1">class1</option>
        <option value="class2">class2</option>
        <option value="class3">class3</option>
      </select>
    </div>

    <div class="buttons">
      <label for="csvFileInput" class="btn primary file-btn">名簿CSV登録</label>
      <input type="file" id="csvFileInput" accept=".csv" style="display:none;" />
      <button id="exportCsvBtn" class="btn secondary">名簿CSV出力</button>
    </div>
  </div>

  <p class="note">
    この設定は年度初めの名簿登録時のみ使用します。通常は「出欠」から始めます。
  </p>
  <p class="note">
    CSV登録を行うと、そのクラスの名簿が上書きされます。
  </p>
</section>

    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
