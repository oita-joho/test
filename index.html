<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>出欠・指名システム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

  <div class="topbar">
    <h1>出欠・指名システム</h1>
    <div id="authStatus" class="auth-status">未ログイン</div>
  </div>

  <div class="panel">
    <button id="loginBtn" class="btn primary">先生ログイン</button>
    <button id="logoutBtn" class="btn secondary" style="display:none;">ログアウト</button>
    <div id="loginMessage"></div>
  </div>

  <div id="appBody" style="display:none;">

    <!-- モード -->
    <div class="panel mode-buttons">
      <button id="modeAttendanceBtn" class="btn primary">出欠</button>
      <button id="modeNominateBtn" class="btn secondary">指名</button>
      <button id="modeSettingsBtn" class="btn secondary">設定</button>
    </div>

    <!-- 出欠 -->
    <div id="attendancePanel" class="panel">
      <div class="toolbar">

        <div class="field">
          <label>クラス</label>
          <select id="classSelect">
            <option value="class1">1組</option>
            <option value="class2">2組</option>
            <option value="class3">3組</option>
            <option value="class4">4組</option>
            <option value="class5">5組</option>
            <option value="class6">6組</option>
            <option value="class7">7組</option>
            <option value="class8">8組</option>
          </select>
        </div>

        <div class="field">
          <label>日付</label>
          <input type="date" id="dateInput">
        </div>

        <div class="buttons">
          <button id="todayBtn" class="btn today">今日</button>
          <button id="prevDayBtn" class="btn secondary">前日</button>
          <button id="prevWeekBtn" class="btn secondary">前週</button>
          <button id="prevMonthBtn" class="btn secondary">前月</button>
          <button id="saveBtn" class="btn primary">SAVE</button>
        </div>
      </div>

      <div class="status-grid">
        <div class="status-card">
          <div class="status-title">欠席人数</div>
          <div id="absentCount" class="status-value">0</div>
        </div>
        <div class="status-card">
          <div class="status-title">保存状態</div>
          <div id="saveState" class="status-value small">---</div>
        </div>
      </div>
    </div>

    <!-- 生徒一覧 -->
    <div id="studentListPanel" class="panel">
      <div id="studentCount">登録人数：0人</div>
      <div id="studentGrid" class="student-grid"></div>
    </div>

    <!-- 指名 -->
    <div id="nominatePanel" class="panel" style="display:none;">
      <h2>指名</h2>

      <div class="toolbar">
        <select id="nominateClassSelect">
          <option value="class1">1組</option>
          <option value="class2">2組</option>
          <option value="class3">3組</option>
          <option value="class4">4組</option>
          <option value="class5">5組</option>
          <option value="class6">6組</option>
          <option value="class7">7組</option>
          <option value="class8">8組</option>
        </select>

        <input type="date" id="nominateDateInput">

        <div class="buttons">
          <button id="randomNominateBtn" class="btn primary">ランダム指名</button>
          <button id="confirmNominateBtn" class="btn today">決定</button>
          <button id="clearNominateBtn" class="btn secondary">指名解除</button>
          <button id="exportNominateCsvBtn" class="btn secondary">CSV出力</button>
        </div>
      </div>

      <div class="status-grid">
        <div class="status-card">
          <div class="status-title">今回の指名</div>
          <div id="currentNomineeName" class="status-value">---</div>
        </div>
        <div class="status-card">
          <div class="status-title">番号</div>
          <div id="currentNomineeNo" class="status-value">---</div>
        </div>
        <div class="status-card">
          <div class="status-title">状態</div>
          <div id="nominateState" class="status-value small">未指名</div>
        </div>
      </div>

      <div id="nominateStudentGrid" class="student-grid"></div>
    </div>

    <!-- 設定 -->
    <div id="settingsPanel" class="panel" style="display:none;">
      <h2>名簿登録</h2>
      <input type="file" id="csvFileInput">
      <button id="exportCsvBtn" class="btn secondary">CSV出力</button>
    </div>

  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
